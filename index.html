<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelGo - Travel Booking Platform</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<nav>

<div class="logo">
<i class="fa-solid fa-earth-asia"></i> TravelGo
</div>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#">Flights</a></li>

<li><a href="#">Trains</a></li>

<li><a href="#">Buses</a></li>

<li><a href="#">Hotels</a></li>

<li><a href="#">Cabs</a></li>

<li><a href="#">Cruises</a></li>

<li><a href="#">Packages</a></li>

<li><a href="#">Offers</a></li>

<li><a href="#">Contact</a></li>

</ul>

<div>

<button class="login">Login</button>

<button class="register">Register</button>

</div>

</nav>

<section class="hero">

<div class="overlay">

<h1>Discover Your Next Journey</h1>

<p>
Book Flights, Trains, Buses, Hotels, Cabs, Cruises &
Holiday Packages at Best Prices
</p>

<div class="booking-card">

<div class="travel-type">

<button>✈ Flight</button>

<button>🚆 Train</button>

<button>🚌 Bus</button>

<button>🚖 Cab</button>

<button>🚢 Cruise</button>

<button>🏨 Hotel</button>

<button>🎒 Package</button>

</div>

<div class="trip-type">

<label>

<input type="radio" name="trip">

One Way

</label>

<label>

<input type="radio" name="trip">

Round Trip

</label>

<label>

<input type="radio" name="trip">

Multi City

</label>

</div>

<div class="search-grid">

<input type="text" placeholder="From">

<input type="text" placeholder="Destination">

<input type="date">

<input type="date">

<select>

<option>Travellers</option>

<option>1 Adult</option>

<option>2 Adults</option>

<option>3 Adults</option>

<option>4 Adults</option>

</select>

<select>

<option>Economy</option>

<option>Premium Economy</option>

<option>Business</option>

<option>First Class</option>

</select>

<button class="search-btn">

Search

</button>

</div>

</div>

</div>

</section>

</body>
</html>
